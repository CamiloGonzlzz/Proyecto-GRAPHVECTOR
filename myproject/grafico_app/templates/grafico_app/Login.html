<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Login - Movimiento de Proyectil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <style>
        body {
            min-height: 100vh;
            background: url('https://wallpapers.com/images/hd/dark-elegant-pattern-y67f2aqpg0m7abe1.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .bg-dark-blur-login {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 18px;
            backdrop-filter: blur(2px);
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.685);
        }
        label,
        .form-label,
        .form-control,
        .btn {
            color: #fff !important;
        }
        .form-control {
            background: #444 !important;
            border: 1px solid #ccc !important;
            color: #fff !important;
        }
        .form-control::placeholder {
            color: #bbb !important;
        }
        .btn-primary {
            background-color: #17a2b8;
            border-color: #17a2b8;
        }
    </style>
</head>
<body class="text-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-md-6 col-lg-4">
        <div class="bg-dark-blur-login p-4">
            <h2 class="mb-3 text-center">Iniciar sesión</h2>
            <form id="loginForm" autocomplete="off">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="tucorreo@ejemplo.com"
                        required
                    />
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Ingresa tu contraseña"
                        required
                    />
                </div>
                <div class="mb-3 form-check">
                    <input
                        type="checkbox"
                        class="form-check-input"
                        id="remember"
                    />
                    <label class="form-check-label" for="remember">Recordarme</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Entrar</button>
                </div>
                <div class="mt-3 text-center">
                    <a href="#" class="link-light" style="text-decoration: none;">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
const API_BASE_URL = 'http://localhost:5278';

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    const btn = e.target.querySelector('button[type="submit"]');
    const originalText = btn.textContent;
    btn.textContent = 'Ingresando...';
    btn.disabled = true;
    
    try {
        console.log('Intentando conectar a:', `${API_BASE_URL}/api/Login/Login`);
        
        const response = await fetch(`${API_BASE_URL}/api/Login/Login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ Correo: email, Clave: password })
        });
        
        console.log('Status:', response.status);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log('Respuesta:', data);
        
        if (data.isSuccess) {
            localStorage.setItem('authToken', data.token);
            window.location.href = '/dashboard/';
        } else {
            alert('Correo o contraseña incorrectos');
        }
    } catch (error) {
        console.error('Error completo:', error);
        alert(`Error de conexión: ${error.message}\n\n1. Verifica puerto API .NET\n2. Ejecuta API primero\n3. Revisa consola (F12)`);
    } finally {
        btn.textContent = originalText;
        btn.disabled = false;
    }
});
</script>



</body>
</html>
