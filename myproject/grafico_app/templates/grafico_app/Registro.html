<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Registro - Movimiento de Proyectil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>

        body {
            min-height: 100vh;
            background: url('https://wallpapers.com/images/hd/dark-elegant-pattern-y67f2aqpg0m7abe1.jpg')
            no-repeat center center fixed;
            background-size: cover;
        }

        .bg-dark-blur-login {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 18px;
            backdrop-filter: blur(2px);
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.685);
        }

        label,
        .form-label,
        .form-control,
        .btn {
            color: #fff !important;
        }

        .form-control {
            background: #444 !important;
            border: 1px solid #ccc !important;
            color: #fff !important;
        }

        .form-control::placeholder {
            color: #bbb !important;
        }

        .btn-primary {
            background-color: #17a2b8;
            border-color: #17a2b8;
        }

        .alert {
            font-size: 14px;
        }

    </style>
</head>

<body class="text-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="col-md-6 col-lg-4">

        <div class="bg-dark-blur-login p-4">

            <h2 class="mb-3 text-center">Crear cuenta</h2>

            <!-- Mensajes Django -->
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST" autocomplete="off">

                {% csrf_token %}

                <!-- Nombre -->
                <div class="mb-3">
                    <label for="nombre" class="form-label">Nombre</label>

                    <input
                        type="text"
                        class="form-control"
                        id="nombre"
                        name="nombre"
                        placeholder="Tu nombre"
                        required
                    />
                </div>

                <!-- Apellidos -->
                <div class="mb-3">

                    <label for="apellidos" class="form-label">
                        Apellidos
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="apellidos"
                        name="apellidos"
                        placeholder="Tus apellidos"
                        required
                    />
                </div>

                <!-- Correo -->
                <div class="mb-3">

                    <label for="correo" class="form-label">
                        Correo electrónico
                    </label>

                    <input
                        type="email"
                        class="form-control"
                        id="correo"
                        name="correo"
                        placeholder="correo@ejemplo.com"
                        required
                    />
                </div>

                <!-- Institucion -->
                <div class="mb-3">

                    <label for="institucion" class="form-label">
                        Institución
                    </label>

                    <input
                        type="text"
                        class="form-control"
                        id="institucion"
                        name="institucion"
                        placeholder="Universidad o institución"
                        required
                    />
                </div>

                <!-- Contraseña -->
                <div class="mb-3">

                    <label for="clave" class="form-label">
                        Contraseña
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        id="clave"
                        name="clave"
                        placeholder="Crea una contraseña"
                        required
                    />
                </div>

                <!-- Confirmar -->
                <div class="mb-3">

                    <label for="confirmar" class="form-label">
                        Confirmar contraseña
                    </label>

                    <input
                        type="password"
                        class="form-control"
                        id="confirmar"
                        name="confirmar"
                        placeholder="Repite tu contraseña"
                        required
                    />
                </div>

                <div class="d-grid">

                    <button type="submit" class="btn btn-primary">
                        Registrarme
                    </button>

                </div>

                <div class="mt-3 text-center">

                    <a href="{% url 'login' %}"
                       class="link-light"
                       style="text-decoration: none;">

                        ¿Ya tienes cuenta? Inicia sesión

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
