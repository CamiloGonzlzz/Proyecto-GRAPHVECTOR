<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Registro - Movimiento de Proyectil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />
    <style>
        body {
            min-height: 100vh;
            background: url('https://wallpapers.com/images/hd/dark-elegant-pattern-y67f2aqpg0m7abe1.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        .bg-dark-blur-login {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 18px;
            backdrop-filter: blur(2px);
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.685);
        }
        label,
        .form-label,
        .form-control,
        .btn {
            color: #fff !important;
        }
        .form-control {
            background: #444 !important;
            border: 1px solid #ccc !important;
            color: #fff !important;
        }
        .form-control::placeholder {
            color: #bbb !important;
        }
        .btn-primary {
            background-color: #17a2b8;
            border-color: #17a2b8;
        }
    </style>
</head>
<body class="text-light">

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-md-6 col-lg-4">
        <div class="bg-dark-blur-login p-4">
            <h2 class="mb-3 text-center">Crear cuenta</h2>
            <form id="registerForm" autocomplete="off">
                <div class="mb-3">
                    <label for="fullname" class="form-label">Nombre completo</label>
                    <input
                        type="text"
                        class="form-control"
                        id="fullname"
                        placeholder="Tu nombre completo"
                        required
                    />
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electrónico</label>
                    <input
                        type="email"
                        class="form-control"
                        id="email"
                        placeholder="tucorreo@ejemplo.com"
                        required
                    />
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input
                        type="password"
                        class="form-control"
                        id="password"
                        placeholder="Crea una contraseña"
                        required
                    />
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirmar contraseña</label>
                    <input
                        type="password"
                        class="form-control"
                        id="confirmPassword"
                        placeholder="Repite tu contraseña"
                        required
                    />
                </div>
                <div class="mb-3 form-check">
                    <input
                        type="checkbox"
                        class="form-check-input"
                        id="terms"
                        required
                    />
                    <label class="form-check-label" for="terms">
                        Acepto los términos y condiciones
                    </label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Registrarme</button>
                </div>
                <div class="mt-3 text-center">
                    <a href="login.html" class="link-light" style="text-decoration: none;">
                        ¿Ya tienes cuenta? Inicia sesión
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;

    if (password !== confirm) {
        alert('Las contraseñas no coinciden');
        return;
    }


    alert('Registro enviado (implementa la lógica aquí)');
});
</script>

</body>
</html>
