<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regresión Lineal</titltle>
    //cdn.jsdelivr.net/npm/bootswatch@4.5.2/dist/darkly/bootstrap.min.css">
    <style>
        :root {
            --color-accent: #17a2b8;
            --color-panel: rgba(0, 0, 0, 0.466);
            --color-panel-strong: rgba(0, 0, 0, 0.62);
            --color-input: #444;
            --color-border: #ccc;
            --color-text: #fff;
            --color-muted: #bbb;
            --color-shadow: rgba(255, 255, 255, 0.685);
        }

        body {
            min-height: 100vh;
            background: url('https://wallpapers.com/images/hd/dark-elegant-pattern-y67f2aqpg0m7abe1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--color-text);
        }

        .bg-overlay {
            background: var(--color-panel);
            border-radius: 18px;
            backdrop-filter: blur(2px);
            box-shadow: 0 8px 32px 0 var(--color-shadow);
            padding: 25px;
        }

        .teoria-box {
            height: calc(100vh - 3rem);
            overflow-y: auto;
            position: sticky;
            top: 1.5rem;
            padding: 1.5rem;
            background: rgba(0, 0, 0, 0.466);
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.685);
            color: #fff;
        }

        .teoria-title {
            color: var(--color-accent);
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        h1, h2, h4, h5, p, li, label, strong {
            color: #fff !important;
        }

        .form-control {
            background: var(--color-input) !important;
            border: 1px solid var(--color-border) !important;
            color: #fff !important;
            border-radius: 10px;
        }

        .form-control::placeholder {
            color: var(--color-muted) !important;
        }

        .btn-primary {
            background-color: var(--color-accent) !important;
            border-color: var(--color-accent) !important;
            color: #fff !important;
            border-radius: 10px;
            padding: 0.65rem 1.5rem;
            font-weight: 600;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: #138496 !important;
            border-color: #138496 !important;
            color: #fff !important;
        }

        .alert {
            border-radius: 14px;
            border: none;
            box-shadow: 0 4px 18px rgba(255,255,255,0.12);
            color: #fff !important;
        }

        .alert-danger {
            background: rgba(220, 53, 69, 0.2) !important;
            border-left: 4px solid #dc3545 !important;
        }

        .alert-info {
            background: rgba(23, 162, 184, 0.16) !important;
            border-left: 4px solid var(--color-accent) !important;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.18) !important;
            border-left: 4px solid #28a745 !important;
        }

        .img-fluid {
            border-radius: 12px;
            background: transparent;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
            border: 2px solid rgba(255,255,255,0.12);
            max-height: 420px;
        }

        .formula-box {
            background: rgba(34, 34, 34, 0.7);
            border-radius: 12px;
            padding: 14px 16px;
            margin-top: 1rem;
            margin-bottom: 1rem;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
        }

        .container-fluid {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .teoria-box {
                height: auto;
                position: static;
                margin-top: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="container-fluid py-4">
    <div class="row">


        <div class="col-md-8 d-flex justify-content-center align-items-start mb-4 mb-md-0">
            <div class="bg-overlay w-100">
                <h1 class="mb-4 text-center">Regresión Lineal</h1>

                {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="post" class="mb-4">
                    {% csrf_token %}
                    <div class="form-group">
                        abel for="x">Valores de X (separados por comas):</label>
                        <input type="text" name="x" id="x" class="form-control" placeholder="Ejemplo: 1, 2, 3, 4" required>
                    </div>
                    <div class="form-group">
                        abel for="y">Valores de Y (separados por comas):</label>
                        <input type="text" name="y" id="y" class="form-control" placeholder="Ejemplo: 2, 3, 5, 7" required>
                    </div>
                    <div class="text-center mt-3">
                        <button type="submit" class="btn btn-primary">Graficar Regresión</button>
                    </div>
                </form>

                {% if imagen %}
                    <div class="text-center">
                        <img src="data:image/png;base64,{{ imagen }}" alt="Gráfico de regresión" class="img-fluid mb-3">

                        <div class="formula-box">
                            <p class="mb-0"><strong>Ecuación:</strong> y = {{ pendiente|floatformat:2 }}x + {{ intercepto|floatformat:2 }}</p>
                        </div>

                        <div class="alert alert-info text-left mt-3">
                            <h5><strong>🔍 Análisis de hipótesis</strong></h5>
                            <p><strong>Decisión:</strong> {{ decision }}</p>
                            <p class="mb-0">{{ explicacion }}</p>
                        </div>

                        <div class="alert alert-success text-left mt-3">
                            <h5><strong>🔮 Predicción</strong></h5>
                            <p class="mb-0">Para T = {{ T_pred }}, el modelo predice que <strong>c ≈ {{ c_pred|floatformat:2 }}</strong>.</p>
                        </div>
                    </div>
                {% endif %}
            </div>
        </div>


        <div class="col-md-4">
            <div class="teoria-box">
                <h2 class="teoria-title">📘 Teoría de la Regresión Lineal</h2>
                <p>La <strong>regresión lineal</strong> es un método estadístico utilizado para modelar la relación entre una variable dependiente <strong>Y</strong> y una o más variables independientes <strong>X</strong>.</p>
                <p>El modelo general es:</p>
                <div class="formula-box text-center">
                    <strong>Y = aX + b</strong>
                </div>

                <h4>🔹 ¿Qué significan sus parámetros?</h4>
                <u
                <ul>
                    ><strong>Pendiente (a):</strong> indica cuánto cambia Y por cada unidad que aumenta X.</l/li>
                    ><strong>Intercepto (b):</strong> es el valor de Y cuando X = 0.</li>
                </ul>

                <h4>🔹 Paso para calcular la recta</h4>
                <u
                <ul>
                    >Calcular medias de X y Y.</l/li>
                    >Obtener la pendiente: Σ(x - x̄)(y - ȳ) / Σ(x - x̄)²</l/li>
                    >Calcular intercepto: ȳ - a·x̄</li>
                </ul>

                <h4>🔹 Hipótesis</h4>
                <p>Evaluamos si existe una relación lineal significativa entre X y Y usando la pendiente:</p>
                <u
                <ul>
                    ><strong>H₀:</strong> a = 0 (no hay relación)</l/li>
                    ><strong>H₁:</strong> a ≠ 0 (sí hay relación)</li>
                </ul>

                <p>Si la pendiente es suficientemente grande en valor absoluto, rechazamos H₀.</p>

                <h4>🔹 Predicción</h4>
                <p>La ecuación permite estimar valores futuros o desconocidos de Y a partir de un valor dado de X.</p>
            </div>
        </div>

    </div>
</div>
</body>
</html>
