<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resta de Vectores R3</titltle>

    //cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheetet">
    //cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        :root {
            --color-accent: #17a2b8;
            --color-panel: rgba(0, 0, 0, 0.466);
            --color-panel-strong: rgba(0, 0, 0, 0.62);
            --color-input: #444;
            --color-border: #ccc;
            --color-text: #fff;
            --color-muted: #bbb;
            --color-shadow: rgba(255, 255, 255, 0.685);
        }

        body {
            min-height: 100vh;
            background: url('https://wallpapers.com/images/hd/dark-elegant-pattern-y67f2aqpg0m7abe1.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--color-text);
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            padding: 25px;
            max-width: 1300px;
            margin: 30px auto;
        }

        .contenido {
            background: var(--color-panel);
            border-radius: 18px;
            padding: 25px;
            box-shadow: 0 8px 32px var(--color-shadow);
            backdrop-filter: blur(2px);
        }

        .teoria {
            background: rgba(0, 0, 0, 0.466);
            border-radius: 18px;
            padding: 1.5rem;
            color: #fff;
            box-shadow: 0 8px 32px rgba(255, 255, 255, 0.685);
            overflow-y: auto;
            max-height: calc(100vh - 60px);
            position: sticky;
            top: 30px;
        }

        .teoria h3 {
            text-align: center;
            font-weight: bold;
            margin-bottom: 1rem;
            color: var(--color-accent);
        }

        .teoria p,
        .teoria li,
        .teoria strong {
            color: #fff;
        }

        .formula-box {
            background: #222;
            padding: 0.75rem;
            border-radius: 8px;
            color: #aaffff;
            margin-bottom: 1rem;
            white-space: pre-wrap;
            font-size: 1.05rem;
        }

        #grafico {
            display: none;
            width: 100%;
            height: 550px;
            border-radius: 12px;
            background: rgba(0,0,0,0.7);
            margin-top: 1rem;
            padding: 1rem;
        }

        h1,
        .vector-title,
        label,
        p,
        li,
        span {
            color: #fff !important;
        }

        .vector-title {
            font-weight: 600;
            font-size: 1.05rem;
        }

        .info-box {
            background: rgba(34, 34, 34, 0.75);
            color: #fff;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 18px;
            border-left: 4px solid var(--color-accent);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .form-label {
            color: #fff !important;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .form-control {
            max-width: 170px;
            font-size: 1.1rem;
            padding: 10px;
            background: var(--color-input) !important;
            border: 1px solid var(--color-border) !important;
            color: #fff !important;
            border-radius: 10px;
        }

        .form-control:focus {
            background: var(--color-input) !important;
            color: #fff !important;
            border-color: var(--color-accent) !important;
            box-shadow: 0 0 0 0.2rem rgba(23, 162, 184, 0.25) !important;
        }

        .btn-primary {
            background-color: var(--color-accent);
            border-color: var(--color-accent);
            border-radius: 10px;
            padding: 0.7rem 1.5rem;
            font-weight: 600;
        }

        .btn-primary:hover,
        .btn-primary:focus {
            background-color: #138496;
            border-color: #138496;
        }

        .input-group-icon {
            color: var(--color-accent);
            font-size: 2rem;
            line-height: 1;
        }

        @media (max-width: 991.98px) {
            .layout {
                grid-template-columns: 1fr;
                padding: 16px;
            }

            .teoria {
                position: static;
                max-height: none;
            }

            #grafico {
                height: 400px;
            }
        }

        @media (max-width: 600px) {
            #grafico {
                height: 350px;
            }

            .form-control {
                max-width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- COLUMNA IZQUIERDA (Inputs + Gráfica) -->
    <div class="contenido shadow-lg">

        <h1 class="text-center text-white mb-3">Resta de Vectores en R³</h1>

        <div class="info-box">
            <strong>Nota:</strong> La resta A − B se calcula restando cada componente correspondiente.
        </div>

        <form id="vectorForm" autocomplete="off">
            <div class="row text-center mb-2">
                <div class="col-5 vector-title">Vector A</div>
                <div class="col-2"></div>
                <div class="col-5 vector-title">Vector B</div>
            </div>

            <!-- X -->
            <div class="row align-items-center mb-2 gx-1 justify-content-center">
                <div class="col-5 d-flex flex-column align-items-center">
                    abel for="x1" class="form-label">X<sub>A</sub></label>
                    <input type="number" step="0.1" id="x1" class="form-control text-center" required>
                </div>
                <div class="col-2 text-center d-flex align-items-end justify-content-center" style="height: 56px;">
                    <span class="input-group-icon"><i class="bi bi-dash"></i></span>
                </div>
                <div class="col-5 d-flex flex-column align-items-center">
                    abel for="x2" class="form-label">X<sub>B</sub></label>
                    <input type="number" step="0.1" id="x2" class="form-control text-center" required>
                </div>
            </div>

            <!-- Y -->
            <div class="row align-items-center mb-2 gx-1 justify-content-center">
                <div class="col-5 d-flex flex-column align-items-center">
                    abel for="y1" class="form-label">Y<sub>A</sub></label>
                    <input type="number" step="0.1" id="y1" class="form-control text-center" required>
                </div>
                <div class="col-2 text-center d-flex align-items-end justify-content-center" style="height: 56px;">
                    <span class="input-group-icon"><i class="bi bi-dash"></i></span>
                </div>
                <div class="col-5 d-flex flex-column align-items-center">
                    abel for="y2" class="form-label">Y<sub>B</sub></label>
                    <input type="number" step="0.1" id="y2" class="form-control text-center" required>
                </div>
            </div>

            <!-- Z -->
            <div class="row align-items-center mb-4 gx-1 justify-content-center">
                <div class="col-5 d-flex flex-column align-items-center">
                    abel for="z1" class="form-label">Z<sub>A</sub></label>
                    <input type="number" step="0.1" id="z1" class="form-control text-center" required>
                </div>
                <div class="col-2 text-center d-flex align-items-end justify-content-center" style="height: 56px;">
                    <span class="input-group-icon"><i class="bi bi-dash"></i></span>
                </div>
                <div class="col-5 d-flex flex-column align-items-center">
                    abel for="z2" class="form-label">Z<sub>B</sub></label>
                    <input type="number" step="0.1" id="z2" class="form-control text-center" required>
                </div>
            </div>

            <div class="text-center">
                <button type="submit" id="calcularBtn" class="btn btn-primary px-4">Calcular Resta (A − B)</button>
            </div>
        </form>

        <div id="grafico" class="d-none"></div>
    </div>

    <!-- COLUMNA DERECHA (TEORÍA) -->
    <div class="teoria">
        <h3>Teoría</h3>

        <p>La <strong>resta de vectores</strong> en R³ se define como:</p>

        <div class="formula-box">
A − B = (Ax − Bx , Ay − By , Az − Bz)
        </div>

        <p>Geométricamente, la resta puede interpretarse como:</p>

        <ul>
            >Sumar A con el inverso de B.</l/li>
            >Construir un paralepípedo usando ambos vectores.</l/li>
            >Usar la ley del triángulo invertido.</li>
        </ul>

        <p>El resultado indica hacia dónde apunta el vector que va desde el final de B hasta el final de A.</p>

        <p>Esta gráfica muestra:</p>

        <ul>
            ><span style="color:red;">Vector A</span></l/li>
            ><span style="color:lime;">Vector B</span></l/li>
            ><span style="color:deepskyblue;">Vector A − B</span></l/li>
            >Cubos extrapolares para cada vector</li>
        </ul>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

<!-- TU SCRIPT ORIGINAL (NO CAMBIADO) -->
<script>
    // Dibuja las 12 aristas del cubo desde (0,0,0) hasta (x,y,z)
    function cuboExtrapolar(x, y, z, color='#fff', width=2) {
        let v = [
            [0,0,0], [x,0,0], [x,y,0], [0,y,0],
            [0,0,z], [x,0,z], [x,y,z], [0,y,z]
        ];
        let edges = [
            [0,1],[1,2],[2,3],[3,0],
            [4,5],[5,6],[6,7],[7,4],
            [0,4],[1,5],[2,6],[3,7]
        ];
        let traces = [];
        for (let e of edges) {
            traces.push({
                type: 'scatter3d',
                mode: 'lines',
                x: [v[e[0]][0], v[e[1]][0]],
                y: [v[e[0]][1], v[e[1]][1]],
                z: [v[e[0]][2], v[e[1]][2]],
                line: {color: color, width: width, dash: 'dot'},
                showlegend: false
            });
        }
        return traces;
    }

    function graficarVectores(x1, y1, z1, x2, y2, z2) {
        const xs = x1 - x2, ys = y1 - y2, zs = z1 - z2;
        const colorCubo = '#fff';

        let data = [
            { type: 'scatter3d', mode: 'lines', x: [0, x1], y: [0, y1], z: [0, z1], line: { color: 'red', width: 6 }, name: `A (${x1}, ${y1}, ${z1})` },
            { type: 'scatter3d', mode: 'lines', x: [0, x2], y: [0, y2], z: [0, z2], line: { color: 'green', width: 6 }, name: `B (${x2}, ${y2}, ${z2})` },
            { type: 'scatter3d', mode: 'lines', x: [0, xs], y: [0, ys], z: [0, zs], line: { color: 'blue', width: 6 }, name: `A−B (${xs}, ${ys}, ${zs})` }
        ];

        data = data
            .concat(cuboExtrapolar(x1, y1, z1, colorCubo, 2))
            .concat(cuboExtrapolar(x2, y2, z2, colorCubo, 2))
            .concat(cuboExtrapolar(xs, ys, zs, colorCubo, 2));

        const valores = [x1, y1, z1, x2, y2, z2, xs, ys, zs];
        const min = Math.min(0, ...valores) - 1;
        const max = Math.max(0, ...valores) + 1;

        const layout = {
            margin: { l: 0, r: 0, b: 0, t: 0 },
            paper_bgcolor: '#212529',
            plot_bgcolor: '#212529',
            font: { color: '#f8f9fa' },
            scene: {
                xaxis: { title: 'X', color: '#fff', range: [min, max] },
                yaxis: { title: 'Y', color: '#fff', range: [min, max] },
                zaxis: { title: 'Z', color: '#fff', range: [min, max] },
                aspectmode: 'cube',
                camera: { eye: { x: 1.5, y: 1.5, z: 0.8 } }
            },
            legend: { x: 0.85, y: 0.95, font: { color: '#f8f9fa' } }
        };

        Plotly.newPlot('grafico', data, layout, { displayModeBar: false });
    }

    document.getElementById('vectorForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const x1 = parseFloat(this.x1.value);
        const y1 = parseFloat(this.y1.value);
        const z1 = parseFloat(this.z1.value);
        const x2 = parseFloat(this.x2.value);
        const y2 = parseFloat(this.y2.value);
        const z2 = parseFloat(this.z2.value);

        document.getElementById('grafico').classList.remove('d-none');
        document.getElementById('grafico').style.display = 'block';
        graficarVectores(x1, y1, z1, x2, y2, z2);
    });
</script>

</body>
</html>
